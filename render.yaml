services:
  - type: web
    name: cortex-seo-audit
    runtime: python
    plan: free
    buildCommand: pip install -r seo-audit/requirements.txt
    startCommand: streamlit run seo-audit/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
